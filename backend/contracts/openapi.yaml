openapi: 3.1.0
info:
  title: Coach Connect API
  version: 0.1.0
  description: HTTP contract between the tRPC BFF and the Go/Revel API.
servers:
  - url: http://localhost:9000
    description: Local Revel API
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Check API liveness
      tags: [System]
      responses:
        "200":
          description: API is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: coach-connect-api
