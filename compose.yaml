name: coach-connect-orbit

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set in .env}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres?sslmode=disable}
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  social:
    build:
      context: ./frontend
      dockerfile: apps/social/Dockerfile
    environment:
      GATEWAY_ORIGIN: http://gateway:3000
      GATEWAY_PUBLIC_ORIGIN: ${GATEWAY_PUBLIC_ORIGIN:-http://localhost:3000}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  marketplace:
    build:
      context: ./frontend
      dockerfile: apps/marketplace/Dockerfile
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/marketplace').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  gateway:
    build:
      context: ./frontend
      dockerfile: apps/gateway/Dockerfile
      args:
        SOCIAL_ORIGIN: http://social:3001
        MARKETPLACE_ORIGIN: http://marketplace:3002
    depends_on:
      api:
        condition: service_healthy
      social:
        condition: service_healthy
      marketplace:
        condition: service_healthy
    environment:
      GO_API_URL: http://api:9000
      SOCIAL_ORIGIN: http://social:3001
      MARKETPLACE_ORIGIN: http://marketplace:3002
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /dashboard
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped
